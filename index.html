<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>inimu | Workshop</title>
    <meta
      name="description"
      content="香りブランド inimu の Workshop ページヘッダー"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Sans+JP:wght@400;500;700&family=Playfair+Display:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="workshop-header" aria-labelledby="workshop-title">
      <div class="workshop-header__shell">
        <p class="workshop-header__eyebrow">Workshop</p>

        <div class="workshop-header__panel">
          <div class="workshop-header__bar">
            <button class="workshop-header__menu" type="button" aria-label="メニュー">
              <span></span>
              <span></span>
              <span></span>
            </button>

            <a class="workshop-header__logo" href="./index.html" aria-label="inimu ホーム">
              logo
            </a>

            <a class="workshop-header__icon" href="#reservation" aria-label="予約">
              <svg
                viewBox="0 0 24 24"
                aria-hidden="true"
                focusable="false"
                class="workshop-header__icon-svg"
              >
                <rect x="3.5" y="4.5" width="17" height="16" rx="1.5"></rect>
                <path d="M7 2.5V6"></path>
                <path d="M17 2.5V6"></path>
                <path d="M3.5 8.5H20.5"></path>
                <path d="M8 13l2.2 2.2L16 9.8"></path>
              </svg>
            </a>
          </div>

          <nav class="workshop-header__breadcrumb" aria-label="パンくず">
            <ol class="workshop-header__breadcrumb-list">
              <li><a href="./index.html">TOP</a></li>
              <li aria-current="page">Workshop</li>
            </ol>
          </nav>

	          <div class="workshop-header__hero">
	            <div class="workshop-header__visual" aria-label="Workshop メインビジュアル">
              <div class="workshop-header__hero-slider">
                <article class="workshop-header__hero-slide" aria-hidden="false">
                  <img
                    src="./assets/hero01.jpg"
                    alt="Workshop hero image 1"
                    width="1248"
                    height="707"
                  />
                </article>
                <article class="workshop-header__hero-slide" aria-hidden="true">
                  <img
                    src="./assets/hero02.jpg"
                    alt="Workshop hero image 2"
                    width="1248"
                    height="707"
                  />
                </article>
                <article class="workshop-header__hero-slide" aria-hidden="true">
                  <img
                    src="./assets/hero03.jpg"
                    alt="Workshop hero image 3"
                    width="1248"
                    height="707"
                  />
                </article>
              </div>

              <div class="workshop-header__content">
                <p class="workshop-header__copy">
                  <span>香りを選ぶ。</span>
                  <span>自分を知る。</span>
                </p>
                <p class="workshop-header__subcopy">Create Your Own Fragrance</p>
                <a class="workshop-header__cta" href="#reservation">予約はこちら</a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </header>

    <main></main>
  </body>
</html>
