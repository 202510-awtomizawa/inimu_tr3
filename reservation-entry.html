<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>inimu | Reservation Entry</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body class="page-contact">
  <main class="contact-form" id="main-content">
    <section class="contact-form__section" aria-labelledby="reservation-entry-title">
      <div class="contact-form__container">
        <header class="contact-form__header">
          <h1 class="contact-form__title" id="reservation-entry-title">RESERVATION GUIDE</h1>
          <p class="contact-form__subtitle">ご予約前のご案内</p>
        </header>

        <p class="contact-form__intro" id="reservation-entry-intro">
          会員登録やログインをすると、ご利用情報の確認がしやすくなります。<br />
          会員登録をせずに、そのまま予約へ進むこともできます。
        </p>

        <nav class="contact-form__header contact-form__intro reservation-entry__choices" aria-label="予約前の選択肢">
          <p><a href="./login-form.html">ログイン</a></p>
          <p><span class="contact-form__required-text">or</span></p>
          <p><a href="./register-form.html">会員登録</a></p>
          <hr />
          <p><a href="./reservation.html">会員登録せずに予約する</a></p>
        </nav>

        <p class="contact-form__required-text">※会員登録・ログインは任意です。</p>
      </div>
    </section>
  </main>
  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const date = params.get("date");
      const course = params.get("course");
      if (!date && !course) return;

      const loginLink = document.querySelector('.reservation-entry__choices a[href*="login-form.html"]');
      if (!loginLink) return;

      const nextParams = new URLSearchParams();
      if (date) nextParams.set("date", date);
      if (course) nextParams.set("course", course);
      loginLink.href = `./login-form.html?${nextParams.toString()}`;
    })();
  </script>
</body>
</html>
