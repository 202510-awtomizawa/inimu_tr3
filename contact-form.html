<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>inimu | Contact</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body class="page-contact">
  <main class="contact-form" id="main-content">
    <section class="contact-form__section" aria-labelledby="contact-form-title">
      <div class="contact-form__container">
        <header class="contact-form__header">
          <h1 class="contact-form__title" id="contact-form-title">CONTACT</h1>
          <p class="contact-form__subtitle">お問い合わせ</p>
        </header>

        <p class="contact-form__intro" id="contact-form-intro">
          ご不明点やご相談がございましたら、下記フォームよりお問い合わせください。<br />
          ご予約は<a href="./reservation-form.html">予約フォーム</a>よりお願いいたします。
        </p>

        <form class="contact-form__form" action="./contact-complete.html" method="get" aria-describedby="contact-form-intro">
          <div class="contact-form__field">
            <label class="contact-form__label" for="contact-name">お名前 <span class="contact-form__required-text">必須</span></label>
            <input class="contact-form__input" id="contact-name" name="name" type="text" autocomplete="name" required />
          </div>

          <div class="contact-form__field">
            <label class="contact-form__label" for="contact-email">メールアドレス <span class="contact-form__required-text">必須</span></label>
            <input class="contact-form__input" id="contact-email" name="email" type="email" autocomplete="email" required />
          </div>

          <div class="contact-form__field">
            <label class="contact-form__label" for="contact-topic">お問い合わせ項目 <span class="contact-form__required-text">必須</span></label>
            <select class="contact-form__select" id="contact-topic" name="topic" required>
              <option value="" selected disabled>お問い合わせ項目を選択してください</option>
              <option value="workshop">ワークショップ内容について</option>
              <option value="availability">予約・空き状況について</option>
              <option value="price-time">料金・所要時間について</option>
              <option value="cancel-change">キャンセル・日程変更について</option>
              <option value="access">アクセス・店舗情報について</option>
              <option value="other">その他</option>
            </select>
          </div>

          <div class="contact-form__field">
            <label class="contact-form__label" for="contact-message">お問い合わせ内容 <span class="contact-form__required-text">必須</span></label>
            <textarea class="contact-form__textarea" id="contact-message" name="message" rows="6" required></textarea>
          </div>

          <div class="contact-form__field contact-form__field--consent">
            <label class="contact-form__checkbox-label" for="contact-consent">
              <input class="contact-form__checkbox" id="contact-consent" name="consent" type="checkbox" required />
              <span><a href="./privacy-policy.html">プライバシーポリシー</a>に同意する <span class="contact-form__required-text">必須</span></span>
            </label>
          </div>

          <button class="contact-form__submit" type="submit">送信する</button>
        </form>
      </div>
    </section>
  </main>
</body>
</html>
