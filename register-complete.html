<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>inimu | Sign Up Complete</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body class="page-contact-complete">
  <main class="contact-complete" id="main-content">
    <section class="contact-complete__section" aria-labelledby="register-complete-title">
      <div class="contact-complete__container">
        <header class="contact-complete__header">
          <h1 class="contact-complete__title" id="register-complete-title">SIGN UP</h1>
          <p class="contact-complete__subtitle">会員登録完了</p>
        </header>

        <p class="contact-complete__message">会員登録を受け付けました。</p>

        <p class="contact-complete__note">※このページはデモ表示です。登録情報の保存やログイン連携は行っていません。</p>

        <a class="contact-complete__back" href="./index.html">トップへ戻る</a>
      </div>
    </section>
  </main>
  <script>
    (function () {
      const container = document.querySelector(".contact-complete__container");
      if (!container) return;

      const params = new URLSearchParams(window.location.search);
      const date = params.get("date");
      const course = params.get("course");
      if (!date && !course) return;

      const nextParams = new URLSearchParams();
      if (date) nextParams.set("date", date);
      if (course) nextParams.set("course", course);

      const reservationLink = document.createElement("a");
      reservationLink.className = "contact-complete__back";
      reservationLink.href = `./reservation-form.html?${nextParams.toString()}`;
      reservationLink.textContent = "予約に進む";
      reservationLink.style.marginTop = "16px";
      reservationLink.style.borderColor = "#de9a81";
      reservationLink.style.backgroundColor = "#de9a81";
      reservationLink.style.color = "#ffffff";
      const backLink = container.querySelector('.contact-complete__back[href="./index.html"]');
      if (backLink) {
        backLink.style.marginTop = "16px";
        container.insertBefore(reservationLink, backLink);
      } else {
        container.appendChild(reservationLink);
      }
    })();
  </script>
</body>
</html>
